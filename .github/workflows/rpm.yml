name: Build packages

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest cephsum/tests/ -v

  build-rpm:
    name: RPM (el${{ matrix.el }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        el: ["8", "9"]

    container:
      image: almalinux:${{ matrix.el }}

    steps:
      - name: Install git and build tools
        run: |
          dnf install -y git rpm-build python3-devel python3-setuptools python3-pytest

      - uses: actions/checkout@v4

      - name: Read version from spec
        id: ver
        run: |
          VERSION=$(awk '/^Version:/{print $2}' cephsum/cephsumfs.spec)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        run: |
          V=${{ steps.ver.outputs.version }}
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          # Repack checkout subdirectory as cephsumfs-<version>/
          tar czf ~/rpmbuild/SOURCES/cephsumfs-${V}.tar.gz \
              --transform "s|^cephsum|cephsumfs-${V}|" \
              cephsum
          cp cephsum/cephsumfs.spec ~/rpmbuild/SPECS/

      - name: Build SRPM and binary RPM
        run: rpmbuild -ba ~/rpmbuild/SPECS/cephsumfs.spec

      - name: Collect RPMs
        run: |
          mkdir -p dist
          find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec cp {} dist/ \;
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cephsumfs-el${{ matrix.el }}-rpms
          path: dist/*.rpm
          if-no-files-found: error

  build-deb:
    name: DEB (ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]

    container:
      image: ubuntu:${{ matrix.ubuntu }}

    steps:
      - name: Install git and build tools
        run: |
          apt-get update -q
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git debhelper dh-python python3-all python3-setuptools \
            python3-pytest fakeroot

      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          VERSION=$(awk -F' = ' '/^version/{print $2}' cephsum/setup.cfg)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create source tree and orig tarball
        run: |
          V=${{ steps.ver.outputs.version }}
          cp -r cephsum cephsumfs-${V}
          tar czf cephsumfs_${V}.orig.tar.gz cephsumfs-${V}

      - name: Build .deb
        run: |
          V=${{ steps.ver.outputs.version }}
          cd cephsumfs-${V}
          dpkg-buildpackage -us -uc -b

      - name: Collect DEBs
        run: |
          mkdir -p dist
          find . -maxdepth 1 -name '*.deb' -exec cp {} dist/ \;
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cephsumfs-ubuntu${{ matrix.ubuntu }}-deb
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: Attach packages to release
    needs: [build-rpm, build-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cephsumfs-*
          merge-multiple: true
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
